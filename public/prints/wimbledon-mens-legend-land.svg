<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Wimbledon Men's Championship Legend Land preview">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="45%" stop-color="#0b1221"/>
      <stop offset="100%" stop-color="#070d18"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c75e"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="45%">
      <stop offset="0%" stop-color="#6b238e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6b238e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#sky)"/>
  <rect width="800" height="1000" fill="url(#glow)"/>
  <!-- court grid -->
  <g stroke="#40916c" stroke-opacity="0.12" stroke-width="1">
    <path d="M80 180 H720 M80 260 H720 M80 340 H720 M80 420 H720 M80 500 H720 M80 580 H720 M80 660 H720 M80 740 H720"/>
    <path d="M160 140 V820 M240 140 V820 M320 140 V820 M400 140 V820 M480 140 V820 M560 140 V820 M640 140 V820"/>
  </g>
  <!-- map frame -->
  <rect x="90" y="160" width="620" height="620" rx="18" fill="#141f35" stroke="#d4af37" stroke-opacity="0.45" stroke-width="2"/>
  <rect x="110" y="180" width="580" height="580" rx="12" fill="#0b1221" stroke="#6b238e" stroke-opacity="0.35" stroke-width="1.5"/>
  <!-- stylized land / paths -->
  <g fill="none" stroke="#40916c" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.85">
    <path d="M200 620 C240 520, 280 480, 340 420 C380 380, 420 360, 460 300 C490 260, 510 220, 540 200"/>
    <path d="M220 680 C300 640, 360 560, 420 500 C470 450, 520 430, 580 380"/>
    <path d="M180 500 C260 470, 320 440, 390 390 C450 340, 500 280, 560 250"/>
  </g>
  <g fill="#d4af37">
    <circle cx="340" cy="420" r="7"/>
    <circle cx="460" cy="300" r="7"/>
    <circle cx="540" cy="200" r="9"/>
    <circle cx="420" cy="500" r="6"/>
    <circle cx="580" cy="380" r="6"/>
    <circle cx="390" cy="390" r="5"/>
    <circle cx="200" cy="620" r="5"/>
  </g>
  <!-- trophy mark -->
  <g transform="translate(370, 430)">
    <path d="M20 0 C32 0 40 10 40 22 C40 38 28 46 20 54 C12 46 0 38 0 22 C0 10 8 0 20 0Z" fill="url(#gold)" opacity="0.95"/>
    <rect x="14" y="54" width="12" height="10" rx="2" fill="#f0c75e"/>
    <rect x="8" y="64" width="24" height="6" rx="2" fill="#d4af37"/>
  </g>
  <!-- title band -->
  <rect x="90" y="820" width="620" height="100" rx="14" fill="#141f35" stroke="#d4af37" stroke-opacity="0.3"/>
  <text x="400" y="860" text-anchor="middle" fill="#f0c75e" font-family="Georgia, serif" font-size="22" font-weight="700" letter-spacing="3">GENTLEMEN'S SINGLES</text>
  <text x="400" y="895" text-anchor="middle" fill="#ffffff" font-family="Georgia, serif" font-size="28" font-weight="700">Championship Legend Land</text>
</svg>
